name: Deploy web/ to GitHub Pages

on:
  push:
    branches: [main]        # change if your default branch differs
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # regenerate web/data.js from index.jsonl + tags.json (stdlib only)
      - name: Build data.js
        run: python3 web/build.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web          # publish ONLY the web/ folder

      - id: deployment
        uses: actions/deploy-pages@v4
